<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Palindrome Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Palindrome Checker</h2>

    <input type="text" id="textInput" placeholder="Enter text">

    <br>

    <button onclick="checkPalindrome()">Check</button>

    <p id="result"></p>
</div>

<script>
function checkPalindrome() {
    let text = document.getElementById("textInput").value;

    let cleaned = text.toLowerCase().replace(/[^a-z0-9]/g, "");
    let reversed = cleaned.split("").reverse().join("");

    if (cleaned !== "" && cleaned === reversed) {
        document.getElementById("result").innerText = "✅ It is a Palindrome!";
    } else {
        document.getElementById("result").innerText = "❌ Not a Palindrome.";
    }
}
</script>

</body>
</html>
