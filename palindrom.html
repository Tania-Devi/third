<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Palindrome Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Palindrome Checker</h2>
    <input type="text" id="textInput" placeholder="Enter text">
    <button onclick="checkPalindrome()">Check</button>
    <p id="result"></p>
</div>

<script>
    function checkPalindrome() {
        let text = document.getElementById("textInput").value;

        // Convert to lowercase and remove non-alphanumeric characters
        let cleaned = text.toLowerCase().replace(/[^a-z0-9]/g, "");

        // Reverse string
        let reversed = cleaned.split("").reverse().join("");

        // Check palindrome
        if (cleaned === reversed && cleaned !== "") {
            document.getElementById("result").innerText = "✅ It is a Palindrome!";
        } else {
            document.getElementById("result").innerText = "❌ Not a Palindrome.";
        }
    }
</script>

</body>
</html>
